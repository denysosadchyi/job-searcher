function buildActivityChart() {
  const days = 14;
  const now = new Date(); now.setHours(0,0,0,0);
  const buckets = new Array(days).fill(0);
  const labels = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    labels.push(d.toLocaleDateString('uk', {day:'numeric', month:'short'}).replace(/\.$/, ''));
  }
  for (const s of allData) {
    if (SKIP.includes(s.name)) continue;
    for (const v of s.items) {
      const dt = parseDateToObj(v);
      if (!dt) continue;
      const diff = Math.floor((now - dt) / 86400000);
      if (diff >= 0 && diff < days) buckets[days - 1 - diff]++;
    }
  }
  const max = Math.max(...buckets, 1);
  const totalPeriod = buckets.reduce((a,b) => a+b, 0);
  const thisWeek = buckets.slice(days - 7).reduce((a,b) => a+b, 0);
  const lastWeek = buckets.slice(days - 14, days - 7).reduce((a,b) => a+b, 0);
  const trend = lastWeek > 0 ? Math.round((thisWeek - lastWeek) / lastWeek * 100) : (thisWeek > 0 ? 100 : 0);
  const trendIcon = trend > 0 ? '\u2191' : trend < 0 ? '\u2193' : '\u2192';
  const trendColor = trend > 0 ? 'var(--green-bright)' : trend < 0 ? 'var(--red)' : 'var(--muted)';
  let barsHtml = '';
  for (let i = 0; i < days; i++) {
    const h = buckets[i] > 0 ? Math.max(4, Math.round(buckets[i] / max * 40)) : 0;
    const isToday = i === days - 1;
    const showLabel = i === 0 || i === days - 1 || i === 7;
    barsHtml += `<div class="activity-bar-wrap" title="${labels[i]}: ${buckets[i]} вакансій">
      <div class="activity-bar${isToday ? ' today' : ''}" style="height:${h}px"></div>
      ${showLabel ? `<div class="activity-bar-label">${labels[i]}</div>` : ''}
    </div>`;
  }
  return `<div class="stat-card wide">
    <div class="stat-label">Активність за 14 днів</div>
    <div class="activity-chart">${barsHtml}</div>
    <div class="activity-summary">
      <span>Всього: <b>${totalPeriod}</b></span>
      <span>Цей тиждень: <b>${thisWeek}</b></span>
      <span style="color:${trendColor}">${trendIcon} ${Math.abs(trend)}% vs минулий</span>
    </div>
  </div>`;
}

function renderStats() {
  let total = 0, scored = 0, sumScore = 0, favCount = 0, noteCount = 0;
  let high = 0, mid = 0, low = 0, none = 0;
  let salaryCount = 0, salaryMax = 0, salaryMin = Infinity;
  const salaryValues = [];
  const sources = {};
  const typeCounts = {product:0, outsource:0, agency:0, gambling:0, startup:0, other:0};
  const favs = getFavUrls();
  const statuses = getStatuses();
  const notesData = getNotes();
  const pipeline = {Applied:0, Interview:0, Offer:0, Rejected:0};
  for (const s of allData) {
    if (SKIP.includes(s.name)) continue;
    for (const v of s.items) {
      total++;
      if (favs.has(v.url)) favCount++;
      if (notesData[v.url]) noteCount++;
      const sal = parseSalaryUSD(v.salary);
      if (sal > 0) { salaryCount++; salaryValues.push(sal); if (sal > salaryMax) salaryMax = sal; if (sal < salaryMin) salaryMin = sal; }
      const st = statuses[v.url];
      if (st && pipeline.hasOwnProperty(st)) pipeline[st]++;
      sources[s.name] = (sources[s.name] || 0) + 1;
      if (v.score === null) { none++; }
      else { scored++; sumScore += v.score; if (v.score >= 6) high++; else if (v.score >= 4) mid++; else low++; }
      const tc = typeClass(v.type);
      if (tc === 'tag-type-product') typeCounts.product++;
      else if (tc === 'tag-type-outsource') typeCounts.outsource++;
      else if (tc === 'tag-type-agency') typeCounts.agency++;
      else if (tc === 'tag-type-gambling') typeCounts.gambling++;
      else if (tc === 'tag-type-startup') typeCounts.startup++;
      else if (v.type) typeCounts.other++;
    }
  }
  if (salaryMin === Infinity) salaryMin = 0;
  const salaryAvg = salaryCount ? Math.round(salaryValues.reduce((a,b) => a+b, 0) / salaryCount) : 0;
  const fmtUSD = (n) => n >= 1000 ? '$' + (n/1000).toFixed(1) + 'k' : '$' + n;
  const avg = scored ? (sumScore / scored).toFixed(1) : '—';
  const pct = (n) => total ? (n / total * 100).toFixed(0) : 0;
  const pipelineTotal = pipeline.Applied + pipeline.Interview + pipeline.Offer + pipeline.Rejected;

  let sourcesHtml = '';
  for (const [name, cnt] of Object.entries(sources).sort((a,b) => b[1] - a[1])) {
    sourcesHtml += `<span class="source-chip">${esc(name)}<b>${cnt}</b></span>`;
  }

  document.getElementById('statsPanel').innerHTML = `
    <div class="stats-panel">
      <div class="stat-card">
        <div class="stat-label">Всього вакансій</div>
        <div class="stat-value">${total}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Середній бал</div>
        <div class="stat-value">${avg} <span class="sub">/ 10</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">В обраному</div>
        <div class="stat-value" style="color:var(--yellow)">${favCount}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">З нотатками</div>
        <div class="stat-value" style="color:var(--accent)">${noteCount}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Із зарплатою</div>
        <div class="stat-value" style="color:var(--green-bright)">${salaryCount}</div>
        ${salaryCount ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">${fmtUSD(salaryMin)} — ${fmtUSD(salaryMax)}<br>avg ${fmtUSD(salaryAvg)}/mo</div>` : ''}
      </div>
      <div class="stat-card">
        <div class="stat-label">Pipeline</div>
        <div class="stat-value">${pipelineTotal}</div>
        <div class="sources-list" style="margin-top:6px">
          <span class="source-chip" style="color:var(--accent)">Applied<b>${pipeline.Applied}</b></span>
          <span class="source-chip" style="color:var(--green)">Interview<b>${pipeline.Interview}</b></span>
          <span class="source-chip" style="color:#2ed573">Offer<b>${pipeline.Offer}</b></span>
          <span class="source-chip" style="color:var(--muted)">Rejected<b>${pipeline.Rejected}</b></span>
        </div>
      </div>
      <div class="stat-card wide">
        <div class="stat-label">Розподіл оцінок</div>
        <div class="score-bar">
          <div class="score-bar-seg" style="width:${pct(high)}%;background:var(--green)"></div>
          <div class="score-bar-seg" style="width:${pct(mid)}%;background:var(--yellow)"></div>
          <div class="score-bar-seg" style="width:${pct(low)}%;background:var(--red)"></div>
          <div class="score-bar-seg" style="width:${pct(none)}%;background:var(--border)"></div>
        </div>
        <div class="score-bar-legend">
          <span><span class="legend-dot" style="background:var(--green)"></span>Hot ${high}</span>
          <span><span class="legend-dot" style="background:var(--yellow)"></span>OK ${mid}</span>
          <span><span class="legend-dot" style="background:var(--red)"></span>Low ${low}</span>
          <span><span class="legend-dot" style="background:var(--border)"></span>N/A ${none}</span>
        </div>
      </div>
      <div class="stat-card wide">
        <div class="stat-label">Типи компаній</div>
        <div class="sources-list">
          ${typeCounts.product ? `<span class="source-chip" style="color:var(--green-bright)">Product<b>${typeCounts.product}</b></span>` : ''}
          ${typeCounts.outsource ? `<span class="source-chip" style="color:var(--yellow)">Outsource<b>${typeCounts.outsource}</b></span>` : ''}
          ${typeCounts.agency ? `<span class="source-chip" style="color:#e0a0ff">Agency<b>${typeCounts.agency}</b></span>` : ''}
          ${typeCounts.startup ? `<span class="source-chip" style="color:#60d0f0">Startup<b>${typeCounts.startup}</b></span>` : ''}
          ${typeCounts.gambling ? `<span class="source-chip" style="color:var(--red)">Gambling<b>${typeCounts.gambling}</b></span>` : ''}
          ${typeCounts.other ? `<span class="source-chip" style="color:var(--muted)">Other<b>${typeCounts.other}</b></span>` : ''}
        </div>
      </div>
      <div class="stat-card wide">
        <div class="stat-label">Джерела</div>
        <div class="sources-list">${sourcesHtml}</div>
      </div>
      ${buildActivityChart()}
    </div>`;
}

// Keyboard navigation
let focusIdx = -1;

function getVisibleCards() {
  return [...document.querySelectorAll('.card:not(.deleting)')];
}

function setFocus(idx) {
  const cards = getVisibleCards();
  if (!cards.length) return;
  // Remove old focus
  cards.forEach(c => c.classList.remove('kb-focus'));
  // Clamp index
  focusIdx = Math.max(0, Math.min(idx, cards.length - 1));
  const card = cards[focusIdx];
  card.classList.add('kb-focus');
  card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function showKbHelp() {
  const existing = document.querySelector('.kb-overlay');
  if (existing) { existing.remove(); return; }
  const overlay = document.createElement('div');
  overlay.className = 'kb-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="kb-modal">
    <h3>Клавіатурні скорочення</h3>
    <div class="kb-row"><span class="kb-key">j</span><span class="kb-desc">Наступна вакансія</span></div>
    <div class="kb-row"><span class="kb-key">k</span><span class="kb-desc">Попередня вакансія</span></div>
    <div class="kb-row"><span class="kb-key">Enter</span><span class="kb-desc">Розгорнути / згорнути</span></div>
    <div class="kb-row"><span class="kb-key">o</span><span class="kb-desc">Відкрити посилання</span></div>
    <div class="kb-row"><span class="kb-key">a</span><span class="kb-desc">Quick Apply (відкрити + Applied)</span></div>
    <div class="kb-row"><span class="kb-key">f</span><span class="kb-desc">Додати в обране</span></div>
    <div class="kb-row"><span class="kb-key">s</span><span class="kb-desc">Змінити статус (pipeline)</span></div>
    <div class="kb-row"><span class="kb-key">n</span><span class="kb-desc">Редагувати нотатку</span></div>
    <div class="kb-row"><span class="kb-key">x</span><span class="kb-desc">Видалити вакансію</span></div>
    <div class="kb-row"><span class="kb-key">z</span><span class="kb-desc">Скасувати видалення (undo)</span></div>
    <div class="kb-row"><span class="kb-key">v</span><span class="kb-desc">Перемкнути вигляд (картки/список)</span></div>
    <div class="kb-row"><span class="kb-key">h</span><span class="kb-desc">Сховати/показати застарілі</span></div>
    <div class="kb-row"><span class="kb-key">c</span><span class="kb-desc">Згорнути/розгорнути секцію</span></div>
    <div class="kb-row"><span class="kb-key">Space</span><span class="kb-desc">Виділити/зняти (режим виділення)</span></div>
    <div class="kb-row"><span class="kb-key">Ctrl+A</span><span class="kb-desc">Виділити всі видимі (режим виділення)</span></div>
    <div class="kb-row"><span class="kb-key">/</span><span class="kb-desc">Фокус на пошук</span></div>
    <div class="kb-row"><span class="kb-key">?</span><span class="kb-desc">Показати цю довідку</span></div>
    <div class="kb-row"><span class="kb-key">Esc</span><span class="kb-desc">Закрити / зняти фокус</span></div>
  </div>`;
  document.body.appendChild(overlay);
}

document.addEventListener('keydown', (e) => {
  // Skip if typing in search box
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  // Close help overlay on Esc
  const overlay = document.querySelector('.kb-overlay');
  if (overlay) {
    if (e.key === 'Escape' || e.key === '?') { overlay.remove(); e.preventDefault(); }
    return;
  }

  const cards = getVisibleCards();
  if (!cards.length && e.key !== '?') return;

  switch (e.key) {
    case 'j':
    case 'ArrowDown':
      e.preventDefault();
      setFocus(focusIdx + 1);
      break;
    case 'k':
    case 'ArrowUp':
      e.preventDefault();
      setFocus(focusIdx - 1);
      break;
    case 'Enter':
      if (focusIdx >= 0 && focusIdx < cards.length) {
        e.preventDefault();
        const hdr = cards[focusIdx].querySelector('.card-header');
        if (hdr) toggle(hdr);
      }
      break;
    case 'o':
      if (focusIdx >= 0 && focusIdx < cards.length) {
        const url = cards[focusIdx].dataset.url;
        if (url) window.open(url, '_blank', 'noopener');
      }
      break;
    case 'f':
      if (focusIdx >= 0 && focusIdx < cards.length) {
        const url = cards[focusIdx].dataset.url;
        if (url) toggleFav(url);
      }
      break;
    case 's':
      if (focusIdx >= 0 && focusIdx < cards.length) {
        const url = cards[focusIdx].dataset.url;
        if (url) {
          const cur = getStatus(url) || '—';
          const idx = STATUS_OPTIONS.indexOf(cur);
          const next = STATUS_OPTIONS[(idx + 1) % STATUS_OPTIONS.length];
          setStatus(url, next);
        }
      }
      break;
    case 'n':
      if (focusIdx >= 0 && focusIdx < cards.length) {
        const url = cards[focusIdx].dataset.url;
        if (url) startEditNote(url);
      }
      break;
    case 'x':
      if (focusIdx >= 0 && focusIdx < cards.length) {
        const btn = cards[focusIdx].querySelector('.btn-del');
        if (btn) del(btn);
      }
      break;
    case 'z':
      undoDelete();
      break;
    case 'v':
      setView(activeView === 'card' ? 'list' : 'card');
      break;
    case 'h':
      toggleHideStale();
      break;
    case 'c':
      if (focusIdx >= 0 && focusIdx < cards.length) {
        const section = cards[focusIdx].closest('.section');
        if (section) toggleSection(section.dataset.section);
      }
      break;
    case ' ':
      if (selectMode && focusIdx >= 0 && focusIdx < cards.length) {
        e.preventDefault();
        toggleSelect(cards[focusIdx].dataset.url);
      }
      break;
    case 'a':
      if (selectMode && e.ctrlKey) {
        e.preventDefault();
        selectAllVisible();
      } else if (!selectMode && !e.ctrlKey && focusIdx >= 0 && focusIdx < cards.length) {
        const url = cards[focusIdx].dataset.url;
        if (url && !getStatus(url)) quickApply(url);
      }
      break;
    case '/':
      e.preventDefault();
      if (window.innerWidth <= 599 && !document.querySelector('.toolbar').classList.contains('search-active')) {
        toggleSearchInput();
      } else {
        document.getElementById('searchBox').focus();
      }
      break;
    case '?':
      e.preventDefault();
      showKbHelp();
      break;
    case 'Escape':
      if (selectMode) { toggleSelectMode(); break; }
      // Clear focus
      cards.forEach(c => c.classList.remove('kb-focus'));
      focusIdx = -1;
      break;
  }
});

function exportCSV() {
  const statuses = getStatuses();
  const favs = getFavUrls();
  const notesData = getNotes();
  const rows = [['Source', 'Title', 'URL', 'Score', 'Type', 'Salary', 'Remote', 'Date', 'Status', 'Pipeline', 'Favorite', 'Note']];

  for (const section of allData) {
    if (SKIP.includes(section.name)) continue;
    for (const v of section.items) {
      const csvEsc = (s) => {
        s = (s || '').replace(/"/g, '""');
        return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s}"` : s;
      };
      rows.push([
        csvEsc(section.name),
        csvEsc(v.title),
        csvEsc(v.url),
        v.score !== null ? v.score : '',
        csvEsc(v.type),
        csvEsc(v.salary),
        csvEsc(v.remote),
        csvEsc(v.published || v.date || ''),
        csvEsc(v.status || 'active'),
        csvEsc(statuses[v.url] || ''),
        favs.has(v.url) ? 'yes' : '',
        csvEsc(notesData[v.url] || ''),
      ].join(','));
    }
  }

  const csv = rows.join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `vacancies-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// Sticky header detection — add .stuck class when header is pinned
function observeStickyHeaders() {
  document.querySelectorAll('.section-hdr').forEach(hdr => {
    const observer = new IntersectionObserver(
      ([entry]) => { hdr.classList.toggle('stuck', entry.intersectionRatio < 1); },
      { threshold: [1], rootMargin: '-1px 0px 0px 0px' }
    );
    observer.observe(hdr);
  });
}

// Re-observe after each render
const origRender = render;
render = function() { origRender(); observeStickyHeaders(); };

load();
setInterval(poll, REFRESH);
// Restore saved view mode
if (activeView === 'list') setView('list');
// Restore hide-stale toggle state
if (hideStale) document.getElementById('hideStaleBtn').classList.add('toggled');
// Restore saved sort mode
if (activeSort !== 'default') {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.sort-btn[onclick="setSort('${activeSort}')"]`);
  if (btn) btn.classList.add('active');
}
// Restore saved search query
if (savedSearch) {
  const sb = document.getElementById('searchBox');
  if (sb) {
    sb.value = savedSearch;
    searchQuery = savedSearch.toLowerCase();
    updateSearchIndicators();
    // On mobile, auto-expand search if there's a saved query
    if (window.innerWidth <= 599) {
      document.querySelector('.toolbar').classList.add('search-active');
      document.getElementById('searchBtn').classList.add('active');
    }
  }
}
// Filters scroll fade indicator
filtersEl.addEventListener('scroll', updateFilterScrollFade, { passive: true });
window.addEventListener('resize', updateFilterScrollFade);

// Search input: Esc clears query (and collapses on mobile); blur closes empty on mobile
document.getElementById('searchBox').addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    e.preventDefault();
    if (e.target.value) {
      clearSearch();
    } else if (window.innerWidth <= 599) {
      toggleSearchInput();
    } else {
      e.target.blur();
    }
  }
});

// Mobile "More" menu — shows action-row in a popup
function toggleMoreMenu(e) {
  if (e) e.stopPropagation();
  const menu = document.getElementById('actionsRow');
  const backdrop = document.getElementById('moreBackdrop');
  const btn = document.getElementById('moreBtn');
  const isOpen = menu.classList.contains('open');
  if (isOpen) closeMoreMenu();
  else {
    menu.classList.add('open');
    backdrop.classList.add('visible');
    btn.classList.add('open');
  }
}
function closeMoreMenu() {
  document.getElementById('actionsRow').classList.remove('open');
  document.getElementById('moreBackdrop').classList.remove('visible');
  document.getElementById('moreBtn').classList.remove('open');
}
// Auto-close more menu when an action inside is tapped (mobile only)
document.getElementById('actionsRow').addEventListener('click', (e) => {
  if (window.innerWidth > 599) return;
  const btn = e.target.closest('.action-btn');
  if (btn) setTimeout(closeMoreMenu, 120);
});
// Close more menu on Esc
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('actionsRow').classList.contains('open')) {
    closeMoreMenu();
  }
});
</script>
